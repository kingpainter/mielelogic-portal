# MieleLogic Integration Quality Scale
# Version: 2.0.0
# Target Tier: Gold
# Status: In Progress

rules:
  # ===== BRONZE TIER RULES =====
  
  config_flow:
    status: done
    comment: Full UI configuration via config flow with username, password, client_id, laundry_id, and opening hours
  
  config_flow_test:
    status: todo
    comment: Config flow tests not yet implemented - planned for Gold tier
  
  dependency_transparency:
    status: done
    comment: No external dependencies required - uses aiohttp from HA core
  
  docs_actions:
    status: exempt
    comment: Integration provides sensors and calendar, not actions/services
  
  docs_config_flow:
    status: done
    comment: README.md documents UI setup process with step-by-step guide
  
  docs_installation:
    status: done
    comment: Installation guide available in README.md and INSTALLATION_GUIDE.md
  
  entity_category:
    status: done
    comment: Diagnostic sensors properly categorized (account balance, etc.)
  
  entity_name:
    status: done
    comment: All entities use has_entity_name=True with modern naming
  
  integration_owner:
    status: done
    comment: Active code owner - KingPainter (GitHub @kingpainter)
  
  parallel_updates:
    status: done
    comment: Uses DataUpdateCoordinator with proper async handling
  
  test_before_setup:
    status: todo
    comment: Tests not yet implemented - planned for Gold tier
  
  unique_config_entry:
    status: done
    comment: Unique ID based on username + laundry_id
  
  # ===== SILVER TIER RULES =====
  
  action_exceptions:
    status: exempt
    comment: Integration provides sensors and calendar, not actions/services
  
  config_entry_unloading:
    status: done
    comment: Proper async_unload_entry implemented in __init__.py
  
  device_info:
    status: done
    comment: DeviceInfo properly configured with identifiers, name, manufacturer, model
  
  diagnostics:
    status: done
    comment: diagnostics.py implemented with proper data redaction (v1.3.2+)
  
  docs_describe_entities:
    status: done
    comment: README.md lists all entities with descriptions and examples
  
  docs_installation_method:
    status: done
    comment: HACS and manual installation documented
  
  docs_supported_devices:
    status: done
    comment: README.md documents MieleLogic laundry service compatibility
  
  docs_troubleshooting:
    status: done
    comment: FAQ and troubleshooting section in README.md
  
  entity_unavailable:
    status: done
    comment: Entities properly set unavailable when coordinator update fails
  
  reauthentication_flow:
    status: done
    comment: Automatic token refresh with fallback to password grant
  
  runtime_data:
    status: done
    comment: Uses coordinator stored in hass.data[DOMAIN][entry.entry_id]
  
  test_before_configure:
    status: done
    comment: Config flow validates credentials before creating entry
  
  # ===== GOLD TIER RULES (Future) =====
  
  brands:
    status: todo
    comment: Not yet implemented - planned for Gold tier
  
  common_modules:
    status: done
    comment: Uses standard HA components (sensor, binary_sensor, calendar)
  
  config_entry_reauth_flow:
    status: done
    comment: Automatic re-authentication on token expiry
  
  dhcp:
    status: exempt
    comment: Cloud service - no DHCP discovery possible
  
  discovery:
    status: exempt
    comment: Cloud service requires credentials - no automatic discovery possible
  
  entity_translations:
    status: done
    comment: Full entity translations with state translations for washer/dryer status sensors (v2.0.0)
  
  has_entity_description:
    status: done
    comment: Refactored sensor.py and binary_sensor.py to use EntityDescription dataclasses (v2.0.0)
  
  integration_test_coverage:
    status: todo
    comment: Comprehensive tests not yet implemented - planned for Gold tier
  
  reconfiguration_flow:
    status: done
    comment: async_step_reconfigure implemented in ConfigFlow - allows changing credentials and laundry ID with reload (v2.0.0)
  
  setup_entry_retry:
    status: done
    comment: DataUpdateCoordinator handles retry on setup failure
  
  ssdp:
    status: exempt
    comment: Cloud service - no SSDP discovery possible
  
  translations:
    status: done
    comment: Full translations in da.json and en.json including entity states, config/options/reconfigure flows (v2.0.0)
  
  usb:
    status: exempt
    comment: Cloud service - no USB devices
  
  zeroconf:
    status: exempt
    comment: Cloud service - no Zeroconf discovery possible

# ===== SUMMARY =====
# Bronze tier: ✅ DONE (all required rules met or exempted)
# Silver tier: ✅ DONE (all required rules met or exempted)
# Gold tier: 🟡 IN PROGRESS (partial implementation)
#
