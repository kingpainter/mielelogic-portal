type: sections
max_columns: 4
title: Vaskehus v2 - Smart Colors
path: vaskehus-v2-smart
icon: ""
sections:
  # ========== STATUS OVERVIEW ==========
  - type: grid
    cards:
      - type: custom:mushroom-title-card
        title: Mielelogic Portal
        alignment: center
        title_tap_action:
          action: none
        subtitle_tap_action:
          action: none
  
  - type: grid
    cards:
      # Active Reservations Card
      - type: custom:mushroom-template-card
        primary: |-
          {% if is_state('binary_sensor.mielelogic_has_reservation', 'on') %}
            {{ state_attr('sensor.mielelogic_reservations', 'total_count') }} Aktive
          {% else %}
            Ingen
          {% endif %}
        secondary: Reservationer
        icon: |-
          {% if is_state('binary_sensor.mielelogic_has_reservation', 'on') %}
            mdi:calendar-check
          {% else %}
            mdi:calendar-blank
          {% endif %}
        icon_color: |-
          {% if is_state('binary_sensor.mielelogic_has_reservation', 'on') %}
            green
          {% else %}
            grey
          {% endif %}
        vertical: false
        fill_container: true
        card_mod:
          style: |
            ha-card {
              {% if is_state('binary_sensor.mielelogic_has_reservation', 'on') %}
                background: linear-gradient(135deg, rgba(6, 214, 160, 0.1) 0%, rgba(6, 214, 160, 0.05) 100%);
                border-left: 4px solid #06D6A0;
              {% else %}
                background: rgba(128, 128, 128, 0.05);
                border-left: 4px solid #9E9E9E;
              {% endif %}
              box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
              transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            }
            ha-card:hover {
              transform: translateY(-4px);
              box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
            }
        grid_options:
          columns: 12
          rows: 1
      
      # Reservation Starting Soon Card
      - type: custom:mushroom-template-card
        primary: >-
          {% if is_state('binary_sensor.mielelogic_reservation_starting_soon', 'on') %}
            {{ state_attr('binary_sensor.mielelogic_reservation_starting_soon', 'next_start_in_minutes') }} min
          {% else %}
            Ingen
          {% endif %}
        secondary: >-
          {% if is_state('binary_sensor.mielelogic_reservation_starting_soon', 'on') %}
            Starter snart
          {% else %}
            Næste reservation
          {% endif %}
        icon: mdi:clock-alert
        tap_action:
          action: none
        color: >-
          {% if is_state('binary_sensor.mielelogic_reservation_starting_soon', 'on') %}
            orange
          {% else %}
            grey
          {% endif %}
        features_position: bottom
        grid_options:
          columns: 12
          rows: 1
        card_mod:
          style: |
            ha-card {
              {% if is_state('binary_sensor.mielelogic_reservation_starting_soon', 'on') %}
                background: linear-gradient(135deg, #0077BE 0%, #00B4D8 100%);
                border-left: 4px solid #00B4D8;
                color: white;
              {% else %}
                background: rgba(128, 128, 128, 0.05);
                border-left: 4px solid #9E9E9E;
              {% endif %}
              box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
              transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
              position: relative;
              overflow: hidden;
            }
            ha-card::before {
              {% if is_state('binary_sensor.mielelogic_reservation_starting_soon', 'on') %}
                content: '';
                position: absolute;
                top: -50%;
                right: -10%;
                width: 200px;
                height: 200px;
                background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
                animation: float 6s ease-in-out infinite;
              {% endif %}
            }
            ha-card:hover {
              transform: translateY(-4px);
              box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
            }
            @keyframes float {
              0%, 100% { transform: translateY(0px); }
              50% { transform: translateY(-10px); }
            }
            mushroom-shape-icon {
              {% if is_state('binary_sensor.mielelogic_reservation_starting_soon', 'on') %}
                --icon-color: white !important;
                --shape-color: rgba(255, 255, 255, 0.2) !important;
              {% endif %}
            }
            .primary, .secondary {
              {% if is_state('binary_sensor.mielelogic_reservation_starting_soon', 'on') %}
                color: white !important;
              {% endif %}
            }

  - type: grid
    cards: []

  # ========== LILLE VASKEHUS ==========
  - type: grid
    cards:
      - type: custom:mushroom-title-card
        title: 🏠 Lille Vaskehus
        alignment: left
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
              font-weight: 700;
              font-size: 1.5rem;
              padding: 0.5rem 0;
            }
      
      # Klatvask 1
      - type: custom:mushroom-template-card
        entity: sensor.mielelogic_klatvask_1_status
        primary: Klatvask 1
        secondary: "{{ states('sensor.mielelogic_klatvask_1_status') }}"
        icon: mdi:washing-machine
        tap_action:
          action: more-info
        badge_icon: >-
          {% if state_attr('sensor.mielelogic_klatvask_1_status', 'is_reserved') and is_state('binary_sensor.mielelogic_has_washer_reservation', 'on') %}
            mdi:account-check
          {% elif state_attr('sensor.mielelogic_klatvask_1_status', 'is_available') %}
            mdi:check-circle
          {% endif %}
        badge_color: >-
          {% if state_attr('sensor.mielelogic_klatvask_1_status', 'is_reserved') and is_state('binary_sensor.mielelogic_has_washer_reservation', 'on') %}
            green
          {% elif state_attr('sensor.mielelogic_klatvask_1_status', 'is_available') %}
            green
          {% endif %}
        color: >-
          {# PRIORITY LOGIC:
             1. RED = Laundry is closed
             2. GREEN = We have reservation (and machine is reserved for us)
             3. ORANGE = Machine available but we don't have reservation
             4. BLUE = Machine is running
             5. GREY = Other states
          #}
          {% set is_closed = state_attr('sensor.mielelogic_klatvask_1_status', 'is_closed') %}
          {% set is_available = state_attr('sensor.mielelogic_klatvask_1_status', 'is_available') %}
          {% set is_reserved = state_attr('sensor.mielelogic_klatvask_1_status', 'is_reserved') %}
          {% set is_running = state_attr('sensor.mielelogic_klatvask_1_status', 'is_running') %}
          {% set we_have_reservation = is_state('binary_sensor.mielelogic_has_washer_reservation', 'on') %}
          
          {% if is_closed %}
            red
          {% elif is_reserved and we_have_reservation %}
            green
          {% elif is_available and not we_have_reservation %}
            orange
          {% elif is_running %}
            blue
          {% else %}
            grey
          {% endif %}
        features_position: bottom
        card_mod:
          style: |
            ha-card {
              {% set is_closed = state_attr('sensor.mielelogic_klatvask_1_status', 'is_closed') %}
              {% set is_available = state_attr('sensor.mielelogic_klatvask_1_status', 'is_available') %}
              {% set is_reserved = state_attr('sensor.mielelogic_klatvask_1_status', 'is_reserved') %}
              {% set is_running = state_attr('sensor.mielelogic_klatvask_1_status', 'is_running') %}
              {% set we_have_reservation = is_state('binary_sensor.mielelogic_has_washer_reservation', 'on') %}
              
              {# RED = Closed #}
              {% if is_closed %}
                background: linear-gradient(135deg, rgba(239, 71, 111, 0.1) 0%, rgba(239, 71, 111, 0.05) 100%);
                border-left: 4px solid #EF476F;
              
              {# GREEN = We have reservation #}
              {% elif is_reserved and we_have_reservation %}
                background: linear-gradient(135deg, rgba(6, 214, 160, 0.1) 0%, rgba(6, 214, 160, 0.05) 100%);
                border-left: 4px solid #06D6A0;
              
              {# ORANGE = Available but no reservation #}
              {% elif is_available and not we_have_reservation %}
                background: linear-gradient(135deg, rgba(255, 152, 0, 0.1) 0%, rgba(255, 152, 0, 0.05) 100%);
                border-left: 4px solid #FF9800;
              
              {# BLUE = Running #}
              {% elif is_running %}
                background: linear-gradient(135deg, rgba(0, 119, 190, 0.1) 0%, rgba(0, 119, 190, 0.05) 100%);
                border-left: 4px solid #0077BE;
              
              {# GREY = Other states #}
              {% else %}
                background: rgba(128, 128, 128, 0.05);
                border-left: 4px solid #9E9E9E;
              {% endif %}
              
              box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
              transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            }
            ha-card:hover {
              transform: translateY(-2px);
              box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            }
        grid_options:
          columns: 12
          rows: 1
      
      # Klatvask 2
      - type: custom:mushroom-template-card
