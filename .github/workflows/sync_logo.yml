name: Sync logo

on:
  push:
    branches: [main, dev]
    paths:
      - "custom_components/mielelogic/frontend/mielelogic_logo.png"

jobs:
  sync-logo:
    name: Embed logo in JS files
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update_logo.py
        run: python update_logo.py

      - name: Commit updated JS files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/mielelogic/frontend/panel.js
          git add custom_components/mielelogic/frontend/mielelogic-booking-card.js
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: sync logo base64 in JS files [skip ci]"
          git push
